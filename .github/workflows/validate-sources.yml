name: Validate Sources

on:
  push:
    branches:
      - main
    paths:
      - "sources/**"
  pull_request:
    branches:
      - main
    paths:
      - "sources/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON files
        run: |
          import json, os, sys, glob

          errors = []
          source_dir = "sources"
          json_files = sorted(glob.glob(f"{source_dir}/*.json"))

          if not json_files:
              print("WARNING: No JSON files found in sources/")
              sys.exit(0)

          print(f"Found {len(json_files)} JSON files to validate\n")

          for f in json_files:
              try:
                  with open(f, "r", encoding="utf-8") as fh:
                      data = json.load(fh)
                  print(f"  OK  {f}")
              except json.JSONDecodeError as e:
                  errors.append(f"  FAIL {f}: {e}")
                  print(f"  FAIL {f}: {e}")
              except Exception as e:
                  errors.append(f"  FAIL {f}: {e}")
                  print(f"  FAIL {f}: {e}")

          print()
          if errors:
              print(f"ERROR: {len(errors)} file(s) failed validation")
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print(f"SUCCESS: All {len(json_files)} files are valid JSON")
              sys.exit(0)
        shell: python

      - name: Validate manifest structure
        run: |
          import json, sys

          with open("sources/manifest.json", "r", encoding="utf-8") as f:
              manifest = json.load(f)

          required_fields = ["schemaVersion", "configVersion", "files"]
          missing = [f for f in required_fields if f not in manifest]
          if missing:
              print(f"ERROR: manifest.json missing fields: {missing}")
              sys.exit(1)

          # 新版：只检查 allSources；兼容旧版 6 字段
          files = manifest.get("files", {})
          has_all_sources = "allSources" in files
          has_old_files = all(f in files for f in ["apiSources", "cloudSources", "spiderSources",
                                                     "domainOverrides", "parsers", "disabledSources"])
          if not has_all_sources and not has_old_files:
              print("ERROR: manifest.files must contain 'allSources' (new) or all 6 legacy fields")
              sys.exit(1)

          print(f"SUCCESS: manifest.json structure valid (configVersion={manifest['configVersion']})")
          if has_all_sources:
              print(f"  All Sources: {files['allSources']}")
          else:
              print(f"  API Sources: {files.get('apiSources', 'N/A')}")
              print(f"  Cloud Sources: {files.get('cloudSources', 'N/A')}")
              print(f"  Spider Sources: {files.get('spiderSources', 'N/A')}")
              print(f"  Domain Overrides: {files.get('domainOverrides', 'N/A')}")
              print(f"  Parsers: {files.get('parsers', 'N/A')}")
              print(f"  Disabled Sources: {files.get('disabledSources', 'N/A')}")
        shell: python

      - name: Detect source changes
        run: |
          import json, os, sys, hashlib

          BASELINE = "sources/.source-baseline.json"

          def extract_counts():
              counts = {}
              detail = {}

              # api_sources.json
              try:
                  with open("sources/api_sources.json", "r") as f:
                      data = json.load(f)
                  sites = data.get("sites", [])
                  counts["api_sources"] = len(sites)
                  detail["api_sources"] = {s.get("key", "?"): s.get("name", "?") for s in sites}
              except: pass

              # cloud_sources.json
              try:
                  with open("sources/cloud_sources.json", "r") as f:
                      data = json.load(f)
                  cloud = data.get("cloudSites", [])
                  counts["cloud_sources"] = len(cloud)
                  detail["cloud_sources"] = {s.get("name", "?"): s.get("name", "?") for s in cloud}
              except: pass

              # spider_sources.json
              try:
                  with open("sources/spider_sources.json", "r") as f:
                      data = json.load(f)
                  sites = data.get("sites", [])
                  counts["spider_sources"] = len(sites)
                  detail["spider_sources"] = {s.get("key", "?"): s.get("name", "?") for s in sites}
              except: pass

              # domain_overrides.json
              try:
                  with open("sources/domain_overrides.json", "r") as f:
                      data = json.load(f)
                  overrides = data.get("overrides", [])
                  counts["domain_overrides"] = len(overrides)
              except: pass

              # parsers.json
              try:
                  with open("sources/parsers.json", "r") as f:
                      data = json.load(f)
                  parses = data.get("parses", [])
                  counts["parsers"] = len(parses)
              except: pass

              # disabled_sources.json
              try:
                  with open("sources/disabled_sources.json", "r") as f:
                      data = json.load(f)
                  keys = data.get("disabledKeys", [])
                  hosts = data.get("disabledHosts", [])
                  counts["disabled_sources"] = {"keys": len(keys), "hosts": len(hosts)}
              except: pass

              return counts, detail

          current_counts, current_detail = extract_counts()

          print("Current source counts:")
          for k, v in current_counts.items():
              print(f"  {k}: {v}")

          print("\n--- Source Change Report ---")

          if os.path.exists(BASELINE):
              with open(BASELINE, "r") as f:
                  baseline = json.load(f)

              changes = []
              old_counts = baseline.get("counts", {})
              old_detail = baseline.get("detail", {})

              for file_key in current_counts:
                  old = old_counts.get(file_key)
                  new = current_counts[file_key]

                  if isinstance(new, dict):
                      old_keys = old.get("keys", 0) if isinstance(old, dict) else 0
                      new_keys = new.get("keys", 0)
                      old_hosts = old.get("hosts", 0) if isinstance(old, dict) else 0
                      new_hosts = new.get("hosts", 0)
                      if old_keys != new_keys:
                          changes.append(f"  {file_key}: disabledKeys {old_keys} → {new_keys}")
                      if old_hosts != new_hosts:
                          changes.append(f"  {file_key}: disabledHosts {old_hosts} → {new_hosts}")
                  elif old != new:
                      delta = new - old
                      sign = "+" if delta > 0 else ""
                      changes.append(f"  {file_key}: {old} → {new} ({sign}{delta})")

                      # Show added/removed sources
                      if file_key in current_detail and file_key in old_detail:
                          old_keys = set(old_detail.get(file_key, {}).keys())
                          new_keys = set(current_detail.get(file_key, {}).keys())
                          added = new_keys - old_keys
                          removed = old_keys - new_keys
                          if added:
                              for k in sorted(added):
                                  changes.append(f"    + {current_detail[file_key][k]}")
                          if removed:
                              for k in sorted(removed):
                                  changes.append(f"    - {old_detail[file_key].get(k, k)}")

              if changes:
                  print("CHANGES DETECTED:")
                  for c in changes:
                      print(c)
                  print(f"\n::notice title=Source Changes::{len(changes)} change(s) detected in sources/")
              else:
                  print("No changes detected (source counts unchanged).")
          else:
              print("No baseline found — creating initial baseline.")
              changes = []

          # Save/update baseline
          os.makedirs(os.path.dirname(BASELINE), exist_ok=True)
          baseline_data = {"counts": current_counts, "detail": current_detail}
          with open(BASELINE, "w") as f:
              json.dump(baseline_data, f, indent=2, ensure_ascii=False, sort_keys=True)
          print(f"\nBaseline updated: {BASELINE}")
        shell: python

      - name: Commit baseline
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sources/.source-baseline.json
          git diff --cached --quiet || git commit -m "chore: update source baseline"
          git pull --rebase origin main || true
          git push