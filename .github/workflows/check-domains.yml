name: Check Source Domains

on:
  push:
    branches:
      - main
    paths:
      - "sources/**"
      - "domain-monitor/extract_domains.py"
      - "domain-monitor/check_domains.py"
      - ".github/workflows/check-domains.yml"
      - "README.md"
      - "docs/**"
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Extract domains
        run: python domain-monitor/extract_domains.py

      - name: Check domains
        run: python domain-monitor/check_domains.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add domain-monitor/domains.json domain-monitor/domains.txt domain-monitor/check-results.json domain-monitor/check-results.md
          git diff --cached --quiet || git commit -m "chore: update weekly domain check results"
          git push

      - name: Send email
        if: ${{ success() && (secrets.SMTP_SERVER || '') != '' && (secrets.SMTP_USERNAME || '') != '' && (secrets.SMTP_PASSWORD || '') != '' && (secrets.MAIL_TO || '') != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: vbox 远程源每周检测报告
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: file://domain-monitor/check-results.md