name: Check Source Domains

on:
  push:
    branches:
      - main
    paths:
      - "sources/**"
      - "domain-monitor/extract_domains.py"
      - "domain-monitor/check_domains.py"
      - ".github/workflows/check-domains.yml"
      - "README.md"
      - "docs/**"
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract domains
        run: python domain-monitor/extract_domains.py

      - name: Check domains
        run: python domain-monitor/check_domains.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: domain-check-results
          path: |
            domain-monitor/domains.json
            domain-monitor/domains.txt
            domain-monitor/check-results.json
            domain-monitor/check-results.md
          if-no-files-found: error

      - name: Check mail config
        id: mail_config
        run: |
          if [ -n "$SMTP_SERVER" ] && [ -n "$SMTP_PORT" ] && [ -n "$SMTP_USERNAME" ] && [ -n "$SMTP_PASSWORD" ] && [ -n "$MAIL_TO" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email
        if: ${{ steps.mail_config.outputs.enabled == 'true' }}
        run: |
          python3 - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage
          from pathlib import Path

          server = os.environ["SMTP_SERVER"]
          port = int(os.environ["SMTP_PORT"])
          username = os.environ["SMTP_USERNAME"]
          password = os.environ["SMTP_PASSWORD"]
          mail_to = os.environ["MAIL_TO"]
          report_path = Path("domain-monitor/check-results.md")
          body = report_path.read_text(encoding="utf-8") if report_path.exists() else "未生成检测报告。"

          message = EmailMessage()
          message["Subject"] = "vbox 远程源每周检测报告"
          message["From"] = username
          message["To"] = mail_to
          message.set_content(body)

          if port == 465:
              with smtplib.SMTP_SSL(server, port, timeout=30) as smtp:
                  smtp.login(username, password)
                  smtp.send_message(message)
          else:
              with smtplib.SMTP(server, port, timeout=30) as smtp:
                  smtp.starttls()
                  smtp.login(username, password)
                  smtp.send_message(message)
          print("邮件发送完成")
          PY
