name: Check Source Domains

on:
  push:
    branches:
      - main
    paths:
      - "sources/**"
      - "domain-monitor/extract_domains.py"
      - "domain-monitor/check_domains.py"
      - ".github/workflows/check-domains.yml"
      - "README.md"
      - "docs/**"
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract domains
        run: python domain-monitor/extract_domains.py

      - name: Check domains
        run: python domain-monitor/check_domains.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add domain-monitor/domains.json domain-monitor/domains.txt domain-monitor/check-results.json domain-monitor/check-results.md
          git commit -m "chore: update weekly domain check results" || echo "No changes"
          git push

      - name: Send email
        if: ${{ env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.MAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: vbox 远程源每周检测报告
          to: ${{ env.MAIL_TO }}
          from: ${{ env.SMTP_USERNAME }}
          body: file://domain-monitor/check-results.md
